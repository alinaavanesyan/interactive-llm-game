<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoJack RAG — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Геометрический паттерн */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 204, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 123, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(0, 123, 255, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(30, 40, 60, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 204, 0, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2.2rem;
            color: #ffcc00;
            margin-bottom: 0.3rem;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(255, 204, 0, 0.3);
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffcc00 0%, #ffb800 100%);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 204, 0, 0.4);
            background: linear-gradient(135deg, #ffdd33 0%, #ffcc00 100%);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .demo-info {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 204, 0, 0.1);
        }

        .demo-credentials {
            background: rgba(255, 204, 0, 0.08);
            padding: 1.2rem;
            border-radius: 12px;
            border-left: 3px solid rgba(255, 204, 0, 0.4);
            font-size: 0.85rem;
        }

        .demo-credentials h3 {
            color: #ffcc00;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .credential-item {
            margin-bottom: 0.7rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }

        .credential-item strong {
            color: #ffcc00;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffcc00 0%, #ffb800 100%);
            color: #1a1a2e;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 0.3rem;
        }

        .divider {
            height: 1px;
            background: rgba(255, 204, 0, 0.1);
            margin: 0.6rem 0;
        }

        /* Мобильный */
        @media (max-width: 600px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.8rem;
            }

            .demo-credentials {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🐴 BoJack RAG</h1>
                <p>Интерактивный чат</p>
            </div>

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email"
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="submit-btn">Войти</button>
            </form>

            <div class="demo-info">
                <div class="demo-credentials">
                    <h3>📋 Тестовые учётные данные</h3>
                    
                    <div class="credential-item">
                        <strong>admin@example.com</strong> <span class="admin-badge">ADMIN</span>
                        <div style="margin-top: 0.2rem; font-size: 0.75rem; color: rgba(255,255,255,0.7);">admin123</div>
                    </div>

                    <div class="divider"></div>

                    <div class="credential-item">
                        <strong>user1@example.com</strong>
                        <div style="margin-top: 0.2rem; font-size: 0.75rem; color: rgba(255,255,255,0.7);">password123</div>
                    </div>

                    <div class="credential-item">
                        <strong>user2@example.com</strong>
                        <div style="margin-top: 0.2rem; font-size: 0.75rem; color: rgba(255,255,255,0.7);">pass456</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
