<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — BoJack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; min-height: 100vh; padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 { font-size: 1.8rem; color: #ffcc00; }
        .header-right { display: flex; gap: 10px; }
        .btn {
            padding: 8px 18px; border-radius: 8px; font-size: 13px;
            font-weight: bold; cursor: pointer; text-decoration: none;
            border: none; display: inline-block;
        }
        .btn-back { background: rgba(255,255,255,.1); color: white; border: 1px solid rgba(255,255,255,.2); }
        .btn-back:hover { background: rgba(255,255,255,.2); }
        .btn-logout { background: rgba(255,80,80,.15); color: #ff8080; border: 1px solid rgba(255,80,80,.25); }
        .btn-logout:hover { background: rgba(255,80,80,.3); }

        .user-card {
            background: rgba(255,204,0,.08);
            border: 1px solid rgba(255,204,0,.25);
            border-radius: 14px; padding: 22px 28px;
            margin-bottom: 28px; display: flex; align-items: center; gap: 18px;
        }
        .avatar {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,204,0,.2); border: 2px solid #ffcc00;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .user-email { font-size: 16px; color: #fff; font-weight: bold; }
        .user-sub { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 3px; }

        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 14px; margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(30,40,60,.7);
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 12px; padding: 18px; text-align: center;
        }
        .stat-num { font-size: 2rem; font-weight: bold; color: #ffcc00; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .section-title { font-size: 13px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }

        .case-card {
            background: rgba(30,40,60,.7);
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 12px; padding: 18px 22px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 16px;
        }
        .case-card.solved { border-color: rgba(0,255,136,.2); }
        .case-card.not-started { opacity: .5; }

        .case-status-icon { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }
        .case-info { flex: 1; }
        .case-num { font-size: 10px; color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        .case-title { font-size: 15px; color: #fff; font-weight: bold; margin-top: 2px; }
        .case-meta { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 5px; display: flex; gap: 16px; flex-wrap: wrap; }
        .case-meta span { display: flex; align-items: center; gap: 4px; }

        .badge {
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;
            flex-shrink: 0;
        }
        .badge-solved { background: rgba(0,255,136,.15); color: #00ff88; border: 1px solid rgba(0,255,136,.3); }
        .badge-progress { background: rgba(255,204,0,.12); color: #ffcc00; border: 1px solid rgba(255,204,0,.25); }
        .badge-new { background: rgba(255,255,255,.06); color: rgba(255,255,255,.35); border: 1px solid rgba(255,255,255,.1); }

        .empty { text-align: center; padding: 40px; color: rgba(255,255,255,.3); font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #ffcc00; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👤 Личный кабинет</h1>
        <div class="header-right">
            <a href="/" class="btn btn-back">← К игре</a>
            <a href="/logout" class="btn btn-logout">Выйти</a>
        </div>
    </div>

    <div id="loading" class="loading">Загрузка...</div>
    <div id="content" style="display:none">

        <div class="user-card">
            <div class="avatar">🕵️</div>
            <div>
                <div class="user-email" id="userEmail"></div>
                <div class="user-sub">Детектив</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="statSolved">0</div>
                <div class="stat-label">Дел раскрыто</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statStarted">0</div>
                <div class="stat-label">Начато</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statAttempts">0</div>
                <div class="stat-label">Ошибок всего</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statMessages">0</div>
                <div class="stat-label">Вопросов задано</div>
            </div>
        </div>

        <div class="section-title">Все дела</div>
        <div id="casesList"></div>

    </div>
</div>

<script>
const ALL_CASES = [
    { id: 1, title: "Исчезновение сценария" },
    { id: 2, title: "Тайна пропавшей бутылки" },
    { id: 3, title: "Анонимное письмо" },
    { id: 4, title: "Сорванная съёмка" },
];

async function load() {
    try {
        const res = await fetch("/api/game/profile");
        if (!res.ok) throw new Error("Ошибка");
        const data = await res.json();
        render(data);
    } catch (e) {
        document.getElementById("loading").textContent = "Не удалось загрузить данные.";
    }
}

function render(data) {
    document.getElementById("userEmail").textContent = data.email;
    document.getElementById("statSolved").textContent = data.solved;
    document.getElementById("statStarted").textContent = data.started;

    const byId = {};
    (data.cases || []).forEach(c => { byId[c.case_id] = c; });

    let totalAttempts = 0, totalMessages = 0;
    (data.cases || []).forEach(c => {
        totalAttempts += c.attempts || 0;
        totalMessages += c.messages_sent || 0;
    });
    document.getElementById("statAttempts").textContent = totalAttempts;
    document.getElementById("statMessages").textContent = totalMessages;

    const list = document.getElementById("casesList");
    list.innerHTML = ALL_CASES.map(c => {
        const s = byId[c.id];
        if (!s) {
            return `<div class="case-card not-started">
                <div class="case-status-icon">🔒</div>
                <div class="case-info">
                    <div class="case-num">Дело № ${c.id}</div>
                    <div class="case-title">${c.title}</div>
                    <div class="case-meta"><span>Не начато</span></div>
                </div>
                <span class="badge badge-new">Новое</span>
            </div>`;
        }
        const icon = s.solved ? "✅" : "🔍";
        const badge = s.solved
            ? `<span class="badge badge-solved">Раскрыто</span>`
            : `<span class="badge badge-progress">В процессе</span>`;
        const solvedDate = s.solved_at
            ? `Раскрыто: ${new Date(s.solved_at).toLocaleDateString("ru-RU")}`
            : `Начато: ${new Date(s.started_at).toLocaleDateString("ru-RU")}`;
        return `<div class="case-card ${s.solved ? 'solved' : ''}">
            <div class="case-status-icon">${icon}</div>
            <div class="case-info">
                <div class="case-num">Дело № ${c.id}</div>
                <div class="case-title">${c.title}</div>
                <div class="case-meta">
                    <span>💬 ${s.messages_sent} вопросов</span>
                    <span>❌ ${s.attempts} ошибок</span>
                    ${s.hints_used ? '<span>💡 Подсказка использована</span>' : ''}
                    <span>${solvedDate}</span>
                </div>
            </div>
            ${badge}
        </div>`;
    }).join("");

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
}

load();
</script>
</body>
</html>
